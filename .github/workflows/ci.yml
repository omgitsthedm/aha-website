name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect package manager
        id: pm
        run: |
          if [ -f "pnpm-lock.yaml" ] || grep -q '"packageManager".*pnpm' package.json 2>/dev/null; then
            echo "manager=pnpm" >> "$GITHUB_OUTPUT"
            echo "install_args=" >> "$GITHUB_OUTPUT"
          elif [ -f "yarn.lock" ] || grep -q '"packageManager".*yarn' package.json 2>/dev/null; then
            echo "manager=yarn" >> "$GITHUB_OUTPUT"
            echo "install_args=" >> "$GITHUB_OUTPUT"
          elif [ -f "bun.lockb" ] || [ -f "bun.lock" ] || grep -q '"packageManager".*bun' package.json 2>/dev/null; then
            echo "manager=bun" >> "$GITHUB_OUTPUT"
            echo "install_args=" >> "$GITHUB_OUTPUT"
          else
            echo "manager=npm" >> "$GITHUB_OUTPUT"
            echo "install_args=--legacy-peer-deps" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.pm.outputs.manager != 'bun'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: ${{ steps.pm.outputs.manager }}

      - name: Setup pnpm
        if: steps.pm.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Bun
        if: steps.pm.outputs.manager == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: ${{ steps.pm.outputs.manager }} install ${{ steps.pm.outputs.install_args }}

      - name: Lint
        run: |
          if ${{ steps.pm.outputs.manager }} run | grep -qE '^\s+lint(\s|$)'; then
            ${{ steps.pm.outputs.manager }} run lint
          else
            echo "No lint script found; skipping"
          fi

      - name: Type check
        run: |
          if ${{ steps.pm.outputs.manager }} run | grep -qE '^\s+typecheck(\s|$)'; then
            ${{ steps.pm.outputs.manager }} run typecheck
          elif ${{ steps.pm.outputs.manager }} run | grep -qE '^\s+type-check(\s|$)'; then
            ${{ steps.pm.outputs.manager }} run type-check
          else
            echo "No typecheck script found; skipping"
          fi

      - name: Test
        run: |
          if ${{ steps.pm.outputs.manager }} run | grep -qE '^\s+test(\s|$)'; then
            ${{ steps.pm.outputs.manager }} run test
          else
            echo "No test script found; skipping"
          fi

      - name: Build
        # CI has no Square secrets; build the credential-free preview catalog
        # (same as the e2e workflow). The real production build is validated by
        # Netlify, which holds SQUARE_ACCESS_TOKEN.
        env:
          AHA_PREVIEW_CATALOG: "true"
        run: |
          if ${{ steps.pm.outputs.manager }} run | grep -qE '^\s+build(\s|$)'; then
            ${{ steps.pm.outputs.manager }} run build
          else
            echo "No build script found; skipping"
          fi
