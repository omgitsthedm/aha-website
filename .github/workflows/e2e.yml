name: e2e

on:
  pull_request:
  push:
    branches: [main, staging]
  workflow_dispatch:

env:
  SQUARE_ENVIRONMENT: sandbox
  AHA_PREVIEW_CATALOG: "true"
  PRINTFUL_ALLOW_CONFIRM_ORDERS: "false"
  PRINTFUL_LIVE_MODE: "false"

jobs:
  # Job names map to the spec's required checks (§12). cart/checkout specs land in Phase 2-3;
  # --pass-with-no-tests keeps the gate green until their tagged specs exist.
  product-flow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npx playwright test --grep '@product|@catalog' --pass-with-no-tests

  cart-flow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npx playwright test --grep @cart --pass-with-no-tests

  checkout-sandbox-flow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npx playwright test --grep @checkout --pass-with-no-tests
