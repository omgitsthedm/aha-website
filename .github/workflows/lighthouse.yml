name: lighthouse

on:
  pull_request:
  workflow_dispatch:

env:
  AHA_PREVIEW_CATALOG: "true"

# Performance budgets (§39): LCP <=2.5s, INP <=200ms, CLS <=0.1. Runs against the built
# site locally; tighten to Deploy Preview URLs once staging is wired.
jobs:
  performance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci
      - run: npm run build
      - name: Start production server
        run: |
          npm run start > /tmp/aha-next.log 2>&1 &
          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:3000/ > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/aha-next.log
          exit 1
      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://127.0.0.1:3000/
          uploadArtifacts: true
          temporaryPublicStorage: true
