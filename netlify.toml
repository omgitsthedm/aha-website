[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_PUBLIC_SITE_URL = "https://www.afterhoursagenda.com"
  SQUARE_API_VERSION = "2024-01-18"
  AHA_FULFILLMENT_MODE = "manual"
  # Non-secret PUBLIC identifiers that legitimately appear in committed docs
  # (SOURCE_OF_TRUTH.md, docs/) and, for NEXT_PUBLIC_*, in the client bundle.
  # Without this, Netlify secrets scanning fails the build (exit 2) on these
  # values. Real secrets (SQUARE_ACCESS_TOKEN, PRINTFUL_API_TOKEN, webhook
  # signature keys) are NOT listed here and remain fully scanned.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SQUARE_APP_ID,SQUARE_APPLICATION_ID,SQUARE_LOCATION_ID,PRINTFUL_STORE_ID"
  # Printful v2 defaults. Live money-switches default OFF everywhere; only production may flip them
  # (and only after the Sandbox/dry-run checkout+fulfillment flow passes). See MASTER-BUILD-INSTRUCTION §11/§25.
  PRINTFUL_API_VERSION = "v2-beta"
  PRINTFUL_API_BASE_URL = "https://api.printful.com/v2"
  PRINTFUL_ALLOW_CONFIRM_ORDERS = "false"
  PRINTFUL_LIVE_MODE = "false"

# ── Production (main) ────────────────────────────────────────────────────────
# SQUARE is live here. Printful live-confirm stays FALSE until the end-to-end flow is
# tested; flip PRINTFUL_ALLOW_CONFIRM_ORDERS + PRINTFUL_LIVE_MODE to "true" only then.
[context.production.environment]
  SQUARE_ENVIRONMENT = "production"
  SQUARE_WEBHOOK_NOTIFICATION_URL = "https://www.afterhoursagenda.com/api/webhooks/square"
  AHA_FULFILLMENT_MODE = "manual"
  PRINTFUL_ALLOW_CONFIRM_ORDERS = "false"
  PRINTFUL_LIVE_MODE = "false"

# ── Staging (persistent branch deploy) ───────────────────────────────────────
[context."staging".environment]
  SQUARE_ENVIRONMENT = "sandbox"
  AHA_FULFILLMENT_MODE = "dry-run"
  PRINTFUL_ALLOW_CONFIRM_ORDERS = "false"
  PRINTFUL_LIVE_MODE = "false"

# ── Deploy Previews (feature/*, drop/*) ──────────────────────────────────────
[context.deploy-preview.environment]
  SQUARE_ENVIRONMENT = "sandbox"
  AHA_FULFILLMENT_MODE = "dry-run"
  PRINTFUL_ALLOW_CONFIRM_ORDERS = "false"
  PRINTFUL_LIVE_MODE = "false"

# ── All other branch deploys ─────────────────────────────────────────────────
[context.branch-deploy.environment]
  SQUARE_ENVIRONMENT = "sandbox"
  AHA_FULFILLMENT_MODE = "dry-run"
  PRINTFUL_ALLOW_CONFIRM_ORDERS = "false"
  PRINTFUL_LIVE_MODE = "false"

[[plugins]]
  package = "@netlify/plugin-nextjs"
